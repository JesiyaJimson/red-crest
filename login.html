<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedCrest — Login</title>
    <meta name="description" content="Sign in or create your RedCrest account.">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(20, 20, 35, 0.85);
            --accent: #ff3355;
            --accent-glow: rgba(255, 51, 85, 0.3);
            --text: #f0f0f5;
            --text-dim: #9898b0;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.04);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .page {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--glass);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        .input-icon {
            padding: 12px;
            opacity: 0.5;
        }

        input {
            background: none;
            border: none;
            color: white;
            padding: 12px 12px 12px 0;
            flex: 1;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 24px;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-guest {
            width: 100%;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            height: 1px;
            background: var(--border);
            flex: 1;
        }

        .msg-error {
            background: rgba(255, 51, 85, 0.1);
            color: #ff3355;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(255, 51, 85, 0.2);
        }

        .msg-error.visible {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-screen {
            text-align: center;
            display: none;
        }

        .success-screen.visible {
            display: block;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .toggle-pw {
            background: none;
            border: none;
            padding-right: 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="brand">
            <div class="brand-logo">R</div>
            <div>
                <div class="brand-name">RedCrest</div>
                <div class="brand-tagline">AI-Powered Women Safety</div>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN -->
            <div class="form-panel active" id="panel-login">
                <div class="form-title">Welcome back 👋</div>
                <div class="form-subtitle">Travel with confidence</div>
                <div class="msg-error" id="login-error">
                    <span id="login-error-text"></span>
                </div>
                <div class="field">
                    <label>Email</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="login-email" placeholder="you@example.com">
                    </div>
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="login-password" placeholder="••••••••">
                        <button class="toggle-pw" onclick="togglePw('login-password', this)">👁️</button>
                    </div>
                </div>
                <button class="btn-submit" id="btn-login">Sign In</button>
                <div class="divider">or</div>
                <button class="btn-guest">🚀 Continue as Guest</button>
            </div>

            <!-- REGISTER -->
            <div class="form-panel" id="panel-register">
                <div class="form-title">Create account 🛡️</div>
                <div class="form-subtitle">Join our safety community</div>
                <div class="msg-error" id="reg-error">
                    <span id="reg-error-text"></span>
                </div>
                <div style="display: flex; gap: 12px;">
                    <div class="field" style="flex:1">
                        <label>First Name</label>
                        <input type="text" id="reg-fname" placeholder="Priya"
                            style="padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); width: 100%;">
                    </div>
                    <div class="field" style="flex:1">
                        <label>Last Name</label>
                        <input type="text" id="reg-lname" placeholder="Sharma"
                            style="padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); width: 100%;">
                    </div>
                </div>
                <div class="field">
                    <label>Email</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="reg-email" placeholder="you@example.com">
                    </div>
                </div>
                <div class="field">
                    <label>Phone</label>
                    <div class="input-wrap">
                        <span class="input-icon">📱</span>
                        <input type="tel" id="reg-phone" placeholder="+91 00000 00000">
                    </div>
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="reg-password" placeholder="••••••••">
                    </div>
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="reg-confirm" placeholder="••••••••">
                    </div>
                </div>
                <div class="field" style="font-size: 12px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="chk-terms" style="width: auto;">
                    I agree to the Terms and Privacy Policy
                </div>
                <button class="btn-submit" id="btn-register">Create Account</button>
            </div>

            <!-- SUCCESS -->
            <div class="success-screen" id="success-screen">
                <div class="success-icon">🎉</div>
                <div class="form-title">Account Created!</div>
                <div class="form-subtitle">Your safety journey begins now.</div>
                <button class="btn-submit" onclick="goToApp()">Enter the App →</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./auth.js"></script>
</body>

</html>
